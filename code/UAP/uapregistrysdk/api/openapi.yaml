          description: 是否支持扩展代理卡片
          type: boolean
      type: object
    MatchExplanation:
      additionalProperties: false
      description: Detailed match explanation when include_explanation is true
      properties:
        matched_fields:
          description: 匹配到的字段列表
          items:
            type: string
          type: array
        match_snippets:
          description: 文本匹配片段列表
          items:
            type: string
          type: array
        field_scores:
          additionalProperties:
            format: float
            type: number
          description: 各字段的匹配得分
          type: object
