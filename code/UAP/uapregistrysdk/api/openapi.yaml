openapi: 3.0.0
info:
  description: API for managing services
  title: Service API
  version: 1.0.0
servers:
- url: /
paths:
  /services:
    get:
      description: Retrieve a list of all services
      parameters:
      - description: wait seconds
        explode: true
        in: query
        name: wait
        required: false
        schema:
          type: string
        style: form
      - description: index
        explode: true
        in: query
        name: index
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Service"
                type: array
          description: Successful operation
        "500":
          description: Internal Server Error
      summary: Get all services
    post:
      description: Create a new service
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
          description: Service created successfully
        "400":
          description: Bad request
        "409":
          description: Conflict - Service already exists
        "422":
          description: Unprocessable Entity - Invalid service parameters
        "500":
          description: Internal Server Error
      summary: Create a new service
  /services/{serviceName}:
    get:
      description: Retrieve services by serviceName
      parameters:
      - description: Name of the service to retrieve
        explode: false
        in: path
        name: serviceName
        required: true
        schema:
          type: string
        style: simple
      - description: wait seconds
        explode: true
        in: query
        name: wait
        required: false
        schema:
          type: string
        style: form
      - description: index
        explode: true
        in: query
        name: index
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Service"
                type: array
          description: Successful operation
        "500":
          description: Internal Server Error
      summary: Get service by name
  /services/{id}:
    delete:
      description: Delete an existing service
      parameters:
      - description: ID of the service to delete
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Service deleted successfully
        "500":
          description: Internal Server Error
      summary: Delete a service
    patch:
      description: Update an existing service
      parameters:
      - description: ID of the service to update
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchServiceRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
          description: Service updated successfully
        "400":
          description: Bad request
        "404":
          description: Service not Found
        "422":
          description: Unprocessable Entity - Invalid service parameters
        "500":
          description: Internal Server Error
      summary: Update a service
  /services/{id}/renewal:
    put:
      description: Renewal a service
      parameters:
      - description: ID of the service to renewal
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Service renewaled successfully
        "404":
          description: Service not Found
        "500":
          description: Internal Server Error
      summary: Renewal a service
  /routes:
    get:
      parameters:
      - description: wait seconds
        explode: true
        in: query
        name: wait
        required: false
        schema:
          type: string
        style: form
      - description: index
        explode: true
        in: query
        name: index
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Route"
                type: array
          description: OK
        "500":
          description: Internal Server Error
      summary: Get all routes
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRouteRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
          description: Created
        "400":
          description: Bad Request
        "409":
          description: Conflict
        "422":
          description: Unprocessable Entity
        "500":
          description: Internal Server Error
      summary: Register a new route
  /routes/{routeName}:
    delete:
      parameters:
      - explode: false
        in: path
        name: routeName
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
      summary: Delete a route
    get:
      parameters:
      - explode: false
        in: path
        name: routeName
        required: true
        schema:
          type: string
        style: simple
      - description: wait seconds
        explode: true
        in: query
        name: wait
        required: false
        schema:
          type: string
        style: form
      - description: index
        explode: true
        in: query
        name: index
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
          description: OK
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      summary: Get a route by name
    put:
      parameters:
      - explode: false
        in: path
        name: routeName
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRouteRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
          description: OK
        "400":
          content:
            text/plain:
              schema:
                type: string
          description: Bad Request
        "404":
          description: Not Found
        "422":
          description: Unprocessable Entity
        "500":
          description: Internal Server Error
      summary: Update a route
  /api/v1/agents/search:
    post:
      tags:
        - agents
      description: Semantic search for agents/services by natural language query
      summary: Semantic search agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SemanticSearchRequest"
            examples:
              basic_query:
                summary: 基础查询
                value:
                  query: "帮我找一个能检查Python代码安全漏洞的代理"
                  topK: 5
              with_constraints:
                summary: 带约束条件的查询
                value:
                  query: "需要一个可以生成APA格式参考文献的研究助理"
                  requiredInputModes: ["text/plain"]
                  requiredOutputModes: ["application/json"]
                  requiredCapabilities:
                    streaming: true
                  minRelevanceScore: 0.5
                  topK: 3
                  includeExplanation: true
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Service"
                type: array
          description: Successful semantic search
        "400":
          description: Bad request - invalid query parameters
        "500":
          description: Internal Server Error
components:
  schemas:
    EphemeralCheck:
      additionalProperties: false
      description: Ephemeral check configuration
      example:
        renewal_unhealthy_timeout: 30s
        renewal_delete_timeout: 60s
        check_type: TTL
        renewal_interval: 15s
      properties:
        check_type:
          default: TTL
          description: 健康检查类型：TTL
          type: string
        renewal_delete_timeout:
          default: 60s
          description: 服务超期未更新则删除
          type: string
        renewal_interval:
          default: 15s
          description: 服务更新周期
          type: string
        renewal_unhealthy_timeout:
          default: 30s
          description: 服务超期未更新则不健康
          type: string
      required:
      - check_type
      type: object
    PersistentCheck:
      additionalProperties: false
      description: Persistent health check configuration
      example:
        check_interval: 15s
        check_http_method: check_http_method
        check_type: check_type
        check_timeout: 5s
        check_http_url: check_http_url
        check_unhealthy_timeout: 60s
      properties:
        check_type:
          description: 健康检查类型：HTTP/HTTPS
          type: string
        check_interval:
          default: 15s
          description: 健康检查时间间隔
          type: string
        check_timeout:
          default: 5s
          description: 健康检查超时时间
          type: string
        check_unhealthy_timeout:
          default: 60s
          description: 服务超期健康检查一直未成功则不健康
          type: string
        check_http_url:
          description: 健康检查URL地址，示例：/healthcheck
          type: string
        check_http_method:
          description: "HTTP, HTTPS健康检查使用的HTTP 方法：GET, HEAD, OPTIONS"
          type: string
      required:
      - check_http_url
      - check_type
      type: object
    CreateServiceRequest:
      additionalProperties: true
      description: Schema for service creation requests
      example:
        agent_protocol: agent_protocol
        connect_timeout: 1
        ephemeral: true
        tags:
        - tags
        - tags
        agent_info_url: agent_info_url
        retries: 0
        path: path
        protocol: protocol
        port: 6
        ephemeral_check:
          renewal_unhealthy_timeout: 30s
          renewal_delete_timeout: 60s
          check_type: TTL
          renewal_interval: 15s
        persistent_check:
          check_interval: 15s
          check_http_method: check_http_method
          check_type: check_type
          check_timeout: 5s
          check_http_url: check_http_url
          check_unhealthy_timeout: 60s
        agent_info: "{}"
        write_timeout: 5
        name: name
        host: host
        read_timeout: 5
      properties:
        ephemeral:
          description: 服务注册类型。true：临时注册；false：持久注册
          type: boolean
        name:
          description: 服务名称
          type: string
        retries:
          description: 连接失败重试次数
          type: integer
        protocol:
          description: 传输协议类型
          type: string
        host:
          description: 后端服务域名/IP
          type: string
        port:
          description: 后端服务端口
          type: integer
        path:
          description: 服务路径
          type: string
        connect_timeout:
          description: 连接超时时间（毫秒）
          type: integer
        write_timeout:
          description: 写入超时时间（毫秒）
          type: integer
        read_timeout:
          description: 读取超时时间（毫秒）
          type: integer
        tags:
          description: "自定义标签（例如[namespacea,group=x]）"
          items:
            type: string
          type: array
        ephemeral_check:
          $ref: "#/components/schemas/EphemeralCheck"
        persistent_check:
          $ref: "#/components/schemas/PersistentCheck"
        agent_protocol:
          description: Agent/Tool服务通信协议
          type: string
        agent_info:
          description: 不同agent_protocol对应的特有内容
          type: object
        agent_info_url:
          description: agent_info为空时，从agent_info_url获取agent_protocol内容
          type: string
      required:
      - host
      - name
      - port
      - protocol
      type: object
    CreateRouteRequest:
